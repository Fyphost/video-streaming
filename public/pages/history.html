<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch History — StreamHub</title>
  <meta name="description" content="Your watch history on StreamHub.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="history">

  <nav class="navbar" id="navbar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content" style="padding:24px">
      <div style="max-width:1100px;margin:0 auto">
        <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:20px"><i class="fa-solid fa-clock-rotate-left"></i> Watch History</h1>
        <div id="history-container">
          <div class="loading-spinner"><div class="spinner"></div><p>Loading…</p></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      buildNavbar('history');
      buildSidebar('history');

      if (!isLoggedIn()) {
        window.location.href = '/login';
        return;
      }

      loadHistory();
    });

    async function loadHistory() {
      const container = document.getElementById('history-container');

      try {
        const data = await apiRequest('/api/users/me/history');
        const videos = data.videos || [];

        if (!videos.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
              <h3>No watch history yet</h3>
              <p>Videos you watch will appear here.</p>
              <a href="/" class="btn btn-primary" style="margin-top:12px">Browse Videos</a>
            </div>`;
          return;
        }

        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'video-grid';
        videos.forEach(v => grid.appendChild(buildVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3>Failed to load history</h3>
            <p>${escapeHtml(err.message)}</p>
          </div>`;
      }
    }
  </script>
</body>
</html>
