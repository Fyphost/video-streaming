<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StreamHub</title>
  <meta name="description" content="Sign in to your StreamHub account to watch, upload and share videos.">
  <meta property="og:title" content="Login — StreamHub">
  <meta property="og:description" content="Sign in to your StreamHub account to watch, upload and share videos.">
  <meta property="og:type" content="website">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="login">

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">
          <div class="logo-icon"><i class="fa-solid fa-play"></i></div>
          StreamHub
        </div>
      </div>

      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>

      <div class="alert alert-error" id="error-msg" style="display:none"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
