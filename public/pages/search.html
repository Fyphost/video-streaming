<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — StreamHub</title>
  <meta name="description" content="Search and discover videos from creators worldwide on StreamHub.">
  <meta property="og:title" content="Search — StreamHub">
  <meta property="og:description" content="Search and discover videos from creators worldwide on StreamHub.">
  <meta property="og:type" content="website">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="search">

  <nav class="navbar" id="navbar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="search-hero">
        <h1><i class="fa-solid fa-magnifying-glass"></i> Search Videos</h1>
        <p>Discover amazing content from creators worldwide</p>
      </div>

      <div class="search-bar-lg-wrap">
        <div class="search-bar-lg">
          <input type="text" id="search-input-lg" placeholder="Search videos, creators…" autocomplete="off">
          <button onclick="doSearch()"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        </div>
        <div class="search-suggestions" id="page-suggestions"></div>
      </div>

      <!-- Category filter pills -->
      <div class="category-pills" id="category-pills">
        <button class="category-pill active" data-cat="" onclick="filterCategory(this, '')">All</button>
        <button class="category-pill" data-cat="Entertainment" onclick="filterCategory(this, 'Entertainment')">🎬 Entertainment</button>
        <button class="category-pill" data-cat="Education" onclick="filterCategory(this, 'Education')">📚 Education</button>
        <button class="category-pill" data-cat="Music" onclick="filterCategory(this, 'Music')">🎵 Music</button>
        <button class="category-pill" data-cat="Gaming" onclick="filterCategory(this, 'Gaming')">🎮 Gaming</button>
        <button class="category-pill" data-cat="Sports" onclick="filterCategory(this, 'Sports')">⚽ Sports</button>
        <button class="category-pill" data-cat="News" onclick="filterCategory(this, 'News')">📰 News</button>
        <button class="category-pill" data-cat="Tech" onclick="filterCategory(this, 'Tech')">💻 Tech</button>
        <button class="category-pill" data-cat="Comedy" onclick="filterCategory(this, 'Comedy')">😂 Comedy</button>
      </div>

      <div id="search-results">
        <!-- Results or trending will be rendered here -->
      </div>

      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentCategory = '';
    let currentQuery = '';

    document.addEventListener('DOMContentLoaded', () => {
      buildNavbar('search');
      buildSidebar('search');

      const params = new URLSearchParams(window.location.search);
      const q = params.get('q') || '';
      currentQuery = q;

      const input = document.getElementById('search-input-lg');
      if (input) input.value = q;

      if (input) {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') doSearch();
        });

        // AJAX suggestions
        let suggestTimer = null;
        input.addEventListener('input', () => {
          clearTimeout(suggestTimer);
          const val = input.value.trim();
          const suggestEl = document.getElementById('page-suggestions');
          if (!val) { if (suggestEl) { suggestEl.innerHTML = ''; suggestEl.style.display = 'none'; } return; }
          suggestTimer = setTimeout(async () => {
            try {
              const data = await fetch(`/api/videos/suggestions?q=${encodeURIComponent(val)}`).then(r => r.json());
              if (!data.suggestions || !data.suggestions.length) {
                suggestEl.style.display = 'none';
                return;
              }
              suggestEl.innerHTML = '';
              data.suggestions.forEach(s => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.textContent = s;
                div.addEventListener('mousedown', (e) => { e.preventDefault(); applySuggestion(s); });
                suggestEl.appendChild(div);
              });
              suggestEl.style.display = 'block';
            } catch {}
          }, 200);
        });

        input.addEventListener('blur', () => {
          setTimeout(() => {
            const s = document.getElementById('page-suggestions');
            if (s) s.style.display = 'none';
          }, 200);
        });
      }

      if (q) performSearch(q);
      else loadTrending();
    });

    function applySuggestion(val) {
      const input = document.getElementById('search-input-lg');
      if (input) input.value = val;
      doSearch();
    }

    function doSearch() {
      const q = document.getElementById('search-input-lg').value.trim();
      currentQuery = q;
      if (q) {
        const url = new URL(window.location.href);
        url.searchParams.set('q', q);
        window.history.pushState({}, '', url);
        performSearch(q, 1, currentCategory);
      } else {
        const url = new URL(window.location.href);
        url.searchParams.delete('q');
        window.history.pushState({}, '', url);
        loadTrending();
      }
    }

    function filterCategory(btn, cat) {
      currentCategory = cat;
      document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (currentQuery) performSearch(currentQuery, 1, cat);
      else if (cat) performSearch('', 1, cat);
      else loadTrending();
    }

    async function loadTrending() {
      const container = document.getElementById('search-results');
      container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading trending…</p></div>';

      try {
        const data = await apiRequest('/api/videos/trending?limit=12');
        container.innerHTML = '';
        document.getElementById('pagination').innerHTML = '';

        if (!data.videos || data.videos.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon"><i class="fa-solid fa-fire"></i></div>
              <h3>No trending videos yet</h3>
              <p>Be the first to upload a video!</p>
            </div>`;
          return;
        }

        const heading = document.createElement('div');
        heading.className = 'search-section-heading';
        heading.innerHTML = '<i class="fa-solid fa-fire" style="color:#f44336"></i> Trending Now';
        container.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'video-grid';
        data.videos.forEach(v => grid.appendChild(buildVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div><h3>Failed to load</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    async function performSearch(query, page = 1, category = '') {
      const container = document.getElementById('search-results');
      container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Searching…</p></div>';

      try {
        let url = `/api/videos?page=${page}&limit=12`;
        if (query) url += `&search=${encodeURIComponent(query)}`;
        if (category) url += `&category=${encodeURIComponent(category)}`;

        const data = await apiRequest(url);
        container.innerHTML = '';

        if (!data.videos || data.videos.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon"><i class="fa-solid fa-magnifying-glass"></i></div>
              <h3>No results found${query ? ` for "${escapeHtml(query)}"` : ''}</h3>
              <p>Try different keywords or select another category.</p>
            </div>`;
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        const resultsInfo = document.createElement('p');
        resultsInfo.className = 'search-results-info';
        resultsInfo.textContent = `Found ${data.total} result${data.total !== 1 ? 's' : ''}${query ? ` for "${query}"` : ''}${category ? ` in ${category}` : ''}`;
        container.appendChild(resultsInfo);

        const grid = document.createElement('div');
        grid.className = 'video-grid';
        data.videos.forEach(v => grid.appendChild(buildVideoCard(v)));
        container.appendChild(grid);

        // Pagination
        const paginationEl = document.getElementById('pagination');
        paginationEl.innerHTML = '';
        if (data.total > 12) {
          const totalPages = Math.ceil(data.total / 12);
          const prevBtn = document.createElement('button');
          prevBtn.textContent = '← Prev';
          prevBtn.disabled = page <= 1;
          prevBtn.onclick = () => performSearch(query, page - 1, category);

          const pageInfo = document.createElement('span');
          pageInfo.style.cssText = 'padding:8px;font-size:0.9rem;color:var(--text-secondary)';
          pageInfo.textContent = `Page ${page} of ${totalPages}`;

          const nextBtn = document.createElement('button');
          nextBtn.textContent = 'Next →';
          nextBtn.disabled = page >= totalPages;
          nextBtn.onclick = () => performSearch(query, page + 1, category);

          paginationEl.append(prevBtn, pageInfo, nextBtn);
        }
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div><h3>Search failed</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }
  </script>
</body>
</html>
