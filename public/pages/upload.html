<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Video — StreamHub</title>
  <meta name="description" content="Upload your videos to StreamHub and share them with the world.">
  <meta property="og:title" content="Upload Video — StreamHub">
  <meta property="og:description" content="Upload your videos to StreamHub and share them with the world.">
  <meta property="og:type" content="website">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="upload">

  <nav class="navbar" id="navbar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="upload-page">
        <h1 class="section-title">Upload Video</h1>

        <div class="upload-dropzone" id="dropzone">
          <div class="icon"><i class="fa-solid fa-video"></i></div>
          <p><strong>Click or drag &amp; drop</strong> to select a video</p>
          <p style="margin-top:6px;font-size:0.82rem">Supported: MP4, WebM, OGG, MOV, AVI (max 500MB)</p>
          <input type="file" id="video-input" accept="video/*" style="display:none">
        </div>

        <div id="selected-file" style="display:none;padding:10px 14px;background:var(--primary-light);border-radius:var(--radius-sm);font-size:0.9rem;color:var(--primary);margin-bottom:16px"></div>

        <div class="upload-progress" id="upload-progress" style="display:none;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px">
            <span>Uploading…</span>
            <span id="progress-text">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="card" style="padding:24px">
          <form id="upload-form">
            <div class="form-group">
              <label class="form-label" for="title">Title <span style="color:var(--danger)">*</span></label>
              <input class="form-control" type="text" id="title" placeholder="Enter video title" required maxlength="200">
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description</label>
              <textarea class="form-control textarea" id="description" placeholder="Tell viewers about your video…" maxlength="2000"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="thumbnail-input">Thumbnail (optional)</label>
              <input class="form-control" type="file" id="thumbnail-input" accept="image/*">
              <p class="form-hint">Recommended: 16:9 ratio, JPG or PNG</p>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px"><i class="fa-solid fa-upload"></i> Upload Video</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/video.js"></script>
</body>
</html>
