<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamHub — Video Streaming Platform</title>
  <meta name="description" content="StreamHub is a free video streaming platform. Watch, upload and share videos with creators worldwide.">
  <meta property="og:title" content="StreamHub — Video Streaming Platform">
  <meta property="og:description" content="Watch, upload and share videos with creators worldwide on StreamHub.">
  <meta property="og:type" content="website">
  <meta name="robots" content="index, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="home">

  <nav class="navbar" id="navbar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="all"><i class="fa-solid fa-house"></i> All Videos</button>
        <button class="tab-btn" data-tab="feed"><i class="fa-solid fa-tv"></i> Subscriptions</button>
      </div>

      <div class="video-grid" id="video-grid">
        <div class="loading-spinner" style="grid-column:1/-1">
          <div class="spinner"></div>
          <p>Loading videos…</p>
        </div>
      </div>

      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/video.js"></script>
</body>
</html>
