<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — StreamHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="register">

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">
          <div class="logo-icon">▶</div>
          StreamHub
        </div>
      </div>

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join StreamHub today — it's free</p>

      <div class="alert alert-error" id="error-msg" style="display:none"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" placeholder="coolcreator123" required autocomplete="username" minlength="3" maxlength="30">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input class="form-control" type="password" id="confirm-password" placeholder="Repeat your password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
