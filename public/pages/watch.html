<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — StreamHub</title>
  <meta name="description" content="Watch this video on StreamHub, the free video streaming platform.">
  <meta property="og:title" content="Watch — StreamHub">
  <meta property="og:description" content="Watch this video on StreamHub, the free video streaming platform.">
  <meta property="og:type" content="video.other">
  <meta property="og:site_name" content="StreamHub">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="watch">

  <nav class="navbar" id="navbar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div id="watch-content">
        <div class="watch-layout">
          <!-- Left: video + details + comments -->
          <div>
            <div id="video-player-area">
              <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading video…</p>
              </div>
            </div>

            <!-- Comments section -->
            <div class="comments-section" id="comments-section" style="display:none">
              <h3>Comments (<span id="comment-count">0</span>)</h3>

              <div class="comment-input-area">
                <textarea id="comment-text" placeholder="Add a comment…" rows="1"></textarea>
                <button class="btn btn-primary" id="comment-submit-btn" onclick="submitCommentFromPage()">Post</button>
              </div>

              <div id="comments-list">
                <div class="loading-spinner">
                  <div class="spinner"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: related videos -->
          <div id="related-videos" style="padding-top:0">
            <div class="loading-spinner">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/comments.js"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="/js/video.js"></script>
  <script>
    // Bridge: get videoId from URL params and pass to submitComment
    function submitCommentFromPage() {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('id');
      // Also handle /watch/:vid_id path (numeric id known after video loads)
      const vid = window._currentVideoId || videoId;
      if (vid) submitComment(vid);
    }

    // Show comments section after video loads; also expose video owner id
    const origRender = window.renderVideoPlayer;
    window.renderVideoPlayer = function(video) {
      window._currentVideoId = video.id;
      window._currentVideoOwnerId = video.user_id;
      origRender(video);
      const cs = document.getElementById('comments-section');
      if (cs) cs.style.display = 'block';
    };
  </script>
</body>
</html>
