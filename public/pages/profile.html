<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — StreamHub</title>
  <meta name="description" content="View this creator's profile, videos and followers on StreamHub.">
  <meta property="og:title" content="Profile — StreamHub">
  <meta property="og:description" content="View this creator's profile, videos and followers on StreamHub.">
  <meta property="og:type" content="profile">
  <meta name="robots" content="index, follow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="profile">

  <nav class="navbar" id="navbar"></nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <!-- Profile Header -->
      <div class="profile-header" id="profile-header">
        <div class="loading-spinner" style="margin:auto">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="profile-tabs" style="display:none">
        <button class="tab-btn active" onclick="switchTab('videos')"><i class="fa-solid fa-video"></i> Videos</button>
        <button class="tab-btn" onclick="switchTab('liked')"><i class="fa-solid fa-heart"></i> Liked</button>
        <button class="tab-btn" onclick="switchTab('history')"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
      </div>

      <!-- Videos Grid -->
      <div id="profile-videos"></div>
      <div id="profile-liked" style="display:none"></div>
      <div id="profile-history" style="display:none"></div>
    </main>
  </div>

  <!-- Edit Profile Modal -->
  <div id="edit-profile-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center">
    <div class="card edit-profile-card">
      <div class="edit-profile-header">
        <h3>Edit Profile</h3>
        <button class="btn-icon-close" onclick="closeEditProfile()" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <!-- Avatar preview + upload -->
      <div class="avatar-edit-section">
        <div class="avatar-preview-wrapper">
          <div id="avatar-preview" class="avatar-preview-circle"></div>
          <label for="edit-avatar" class="avatar-camera-btn" title="Change photo">
            <i class="fa-solid fa-camera"></i>
          </label>
          <input type="file" id="edit-avatar" accept="image/*" style="display:none">
        </div>
        <p class="form-hint" style="text-align:center;margin-top:6px">JPG, PNG or GIF · max 5 MB</p>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="edit-username">Username</label>
        <div class="input-with-status">
          <input class="form-control" type="text" id="edit-username" placeholder="username" minlength="3" maxlength="30" autocomplete="off">
          <span class="username-status" id="username-status"></span>
        </div>
        <p class="form-hint">3–30 characters, letters, numbers, and underscores only</p>
      </div>

      <!-- Bio -->
      <div class="form-group">
        <label class="form-label" for="edit-bio">Bio</label>
        <textarea class="form-control textarea" id="edit-bio" placeholder="Tell the world about yourself…" maxlength="500" style="min-height:80px" oninput="updateBioCount()"></textarea>
        <p class="form-hint" style="text-align:right"><span id="bio-char-count">0</span>/500</p>
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button class="btn btn-outline" onclick="closeEditProfile()">Cancel</button>
        <button class="btn btn-primary" id="save-profile-btn" onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
  <script>
    function switchTab(tab) {
      const btns = document.querySelectorAll('#profile-tabs .tab-btn');
      btns.forEach((btn, i) => {
        btn.classList.toggle('active',
          (i === 0 && tab === 'videos') ||
          (i === 1 && tab === 'liked') ||
          (i === 2 && tab === 'history')
        );
      });

      document.getElementById('profile-videos').style.display = tab === 'videos' ? 'block' : 'none';
      const likedEl = document.getElementById('profile-liked');
      likedEl.style.display = tab === 'liked' ? 'block' : 'none';
      const historyEl = document.getElementById('profile-history');
      historyEl.style.display = tab === 'history' ? 'block' : 'none';

      if (tab === 'liked' && !likedEl.dataset.loaded) {
        likedEl.dataset.loaded = '1';
        loadLikedVideos(likedEl);
      }
      if (tab === 'history' && !historyEl.dataset.loaded) {
        historyEl.dataset.loaded = '1';
        loadHistoryVideos(historyEl);
      }
    }

    async function loadLikedVideos(container) {
      container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading…</p></div>';
      try {
        const data = await apiRequest('/api/users/me/liked');
        container.innerHTML = '';
        if (!data.videos || data.videos.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="icon"><i class="fa-solid fa-heart"></i></div><h3>No liked videos yet</h3></div>';
          return;
        }
        const grid = document.createElement('div');
        grid.className = 'video-grid';
        data.videos.forEach(v => grid.appendChild(buildVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div><h3>${escapeHtml(err.message)}</h3></div>`;
      }
    }

    async function loadHistoryVideos(container) {
      container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading…</p></div>';
      try {
        const data = await apiRequest('/api/users/me/history');
        container.innerHTML = '';
        if (!data.videos || data.videos.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="icon"><i class="fa-solid fa-clock-rotate-left"></i></div><h3>No watch history yet</h3></div>';
          return;
        }
        const grid = document.createElement('div');
        grid.className = 'video-grid';
        data.videos.forEach(v => grid.appendChild(buildVideoCard(v)));
        container.appendChild(grid);
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div><h3>${escapeHtml(err.message)}</h3></div>`;
      }
    }
  </script>

  <!-- Followers / Following Modal -->
  <div id="follow-list-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;padding:16px" onclick="closeFollowListModal(event)">
    <div class="card" style="width:100%;max-width:420px;padding:0;overflow:hidden;position:relative">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
        <h3 id="follow-list-title" style="margin:0;font-size:1.1rem"></h3>
        <button onclick="document.getElementById('follow-list-modal').style.display='none'" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-secondary);line-height:1">&times;</button>
      </div>
      <div id="follow-list-body" style="max-height:60vh;overflow-y:auto;padding:8px 0"></div>
    </div>
  </div>
</body>
</html>
